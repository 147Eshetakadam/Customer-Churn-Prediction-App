<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ChurnIQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c10; --surface: #111318; --surface2: #181c24;
      --border: #1e2530; --border2: #252d3a;
      --accent: #00e5ff; --accent2: #7c3aed;
      --text: #e8eaf0; --text2: #8892a4; --text3: #4a5568;
      --red: #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    /* Glows */
    .glow-1 {
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
      top: -100px; left: -100px;
      pointer-events: none;
    }
    .glow-2 {
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(0,229,255,0.1) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      pointer-events: none;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }
    .login-box::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin: 0 auto 12px;
    }
    .logo-name {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }
    .logo-desc { font-size: 12px; color: var(--text3); margin-top: 4px; font-family: 'DM Mono', monospace; }
    .form-label {
      display: block;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .form-group { margin-bottom: 18px; }
    .form-control {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,0.1); }
    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-login:hover { background: #33ecff; transform: translateY(-1px); }
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
      margin-top: 20px;
      line-height: 1.8;
    }
    .hint span { color: var(--text2); }
  </style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="login-box">
    <div class="logo">
      <div class="logo-icon">📡</div>
      <div class="logo-name">ChurnIQ</div>
      <div class="logo-desc">Customer Churn Prediction System</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="error-msg">⚠ {{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn-login">Sign In →</button>
    </form>

    <div class="hint">
      Demo credentials<br>
      <span>admin</span> / <span>churn2025</span> &nbsp;·&nbsp; <span>analyst</span> / <span>telecom123</span>
    </div>
  </div>
</body>
</html>
